# custom settings
# encoding: utf-8

# 自定义键盘布局
custom:
  __include: ./../public/preset_keyboards/default:/preset_keyboards
  default:
    name: default
    ascii_mode: 0
    height: 46
    height_land: 34
    horizontal_gap: 3
    vertical_gap: 4
    vertical_gap_land: 3
    round_corner: 6
    key_text_offset_x: -1
    key_text_offset_y: 5
    key_press_text_offset_x: 0
    key_press_text_offset_y: 0
    key_upper_press_text_offset_x: 0
    key_upper_press_text_offset_y: 0
    key_upper_text_offset_x: 0
    key_upper_text_offset_y: 5
    key_down_text_offset_x: 0
    key_down_text_offset_y: -1
    key_down_press_text_offset_x: 0
    key_down_press_text_offset_y: 0
    preview_round_corner: 9
    long_preview_round_corner: 9
    long_preview_padding: 0
    long_preview_margin: 4
    preview: true
    shadow: { radius: 0, offsetX: 0, offsetY: 0, color: "#90949C" }
    menu: { events: [
            eisu_toggle_emoji,
            function_common_speech_recognition,
            eisu_toggle_keyboard_english,
            eisu_toggle_clip_board,
            eisu_toggle_edit_setting,
            function_rime_switcher,
          ] }
    width: 9
    keys:
      # 第一行
      - {
          click: "'",
          label: "'",
          swipe_up: commit_1,
          long_click: [commit_apostrophe, commit_1, '""{Left}',  "''{Left}", "一"],
        }
      - {
          click: ',',
          label: ',',
          swipe_up: commit_2,
          long_click: [commit_comma, commit_2, '<', "二"],
        }
      - {
          click: '.',
          label: '.',
          swipe_up: commit_3,
          long_click: [commit_period, commit_3, '>', "三"],
        }
      - {
          click: p,
          label: P,
          swipe_up: commit_4,
          swipe_down: tiger_P,
          long_click: [commit_p, commit_4, commit_P, "四"],
        }
      - {
          click: y,
          label: Y,
          swipe_up: commit_5,
          swipe_down: tiger_Y,
          long_click: [commit_y, commit_5, commit_Y, "五"],
        }
      - {
          click: f,
          label: F,
          swipe_up: commit_6,
          swipe_down: tiger_F,
          long_click: [commit_f, commit_6, commit_F, "六"],
        }
      - {
          click: g,
          label: G,
          swipe_up: commit_7,
          swipe_down: tiger_G,
          long_click: [commit_g, commit_7, commit_G, "七"],
        }
      - {
          click: c,
          label: C,
          swipe_up: commit_8,
          swipe_down: tiger_C,
          long_click: [commit_c, commit_8, commit_C, "八"],
        }
      - {
          click: r,
          label: R,
          swipe_up: commit_9,
          swipe_down: tiger_R,
          long_click: [commit_r, commit_9, commit_R, "九"],
        }
      - {
          click: l,
          label: L,
          swipe_up: commit_0,
          swipe_down: tiger_L,
          long_click: [commit_l, commit_0, commit_L, "〇"],
        }
      - {
          click: '/',
          label: '/',
          swipe_up: send_grave,
          swipe_down: "?",
          long_click: [commit_slash, commit_halfslash, commit_grave, "?"],
          width: 10,
        }
      
      # 第二行
      - {
          click: a,
          label: A,
          swipe_up: commit_half_tilde,
          swipe_down: tiger_A,
          long_click: [commit_a, commit_half_tilde, commit_A],
        }
      - {
          click: o,
          label: O,
          swipe_up: commit_halfat,
          swipe_down: tiger_O,
          long_click: [commit_o, commit_halfat, commit_O],
        }
      - {
          click: e,
          label: E,
          swipe_up: commit_halfpoundsign,
          swipe_down: tiger_E,
          long_click: [commit_e, commit_halfpoundsign, commit_E],
        }
      - {
          click: u,
          label: U,
          swipe_up: "$",
          swipe_down: tiger_U,
          long_click: [commit_u, "$", commit_U],
        }
      - {
          click: i,
          label: I,
          swipe_up: "%",
          swipe_down: tiger_I,
          long_click: [commit_i, "%", commit_I],
        }
      - {
          click: d,
          label: D,
          swipe_up: "^",
          swipe_down: tiger_D,
          long_click: [commit_d, "^", commit_D],
        }
      - {
          click: h,
          label: H,
          swipe_up: "&",
          swipe_down: tiger_H,
          long_click: [commit_h, "&", commit_H],
        }
      - {
          click: t,
          label: T,
          swipe_up: "*",
          swipe_down: tiger_T,
          long_click: [commit_t, "*", commit_T],
        }
      - {
          click: n,
          label: N,
          swipe_up: text_fullbracket,
          swipe_down: tiger_N,
          long_click: [commit_n, text_fullbracket, commit_N],
        }
      - {
          click: s,
          label: S,
          swipe_up: text_fullsquarebracket,
          swipe_down: tiger_S,
          long_click: [commit_s, text_fullsquarebracket, commit_S],
        }
      - {
          click: commit_minus,
          label: "-",
          swipe_up: "+",
          swipe_down: "+",
          long_click: [commit_minus, "+"],
          width: 10,
        }

      # 第三行
      - {
          click: shift,
          has_menu: text_delimiter,
          name: shift,
          preview: false,
        }
      - {
          click: q,
          label: Q,
          swipe_up: ";",
          swipe_down: tiger_Q,
          long_click: [commit_q, ";", commit_Q],
        }
      - {
          click: j,
          label: J,
          swipe_up: ":",
          swipe_down: tiger_J,
          long_click: [commit_j, ":", commit_J],
        }
      - {
          click: k,
          label: K,
          swipe_up: "、",
          swipe_down: tiger_K,
          long_click: [commit_k, "、", commit_K],
        }
      - {
          click: x,
          label: X,
          swipe_up: "|",
          swipe_down: tiger_X,
          long_click: [commit_x, "|", commit_X],
        }
      - {
          click: b,
          label: B,
          swipe_up: "?",
          swipe_down: tiger_B,
          long_click: [commit_b, "?", commit_B],
        }
      - {
          click: m,
          label: M,
          swipe_up: "!",
          swipe_down: tiger_M,
          long_click: [commit_m, "!", commit_M],
        }
      - {
          click: w,
          label: W,
          swipe_up: text_half_ellipsis,
          swipe_down: tiger_W,
          long_click: [commit_w, text_half_ellipsis, commit_W],
        }
      - {
          click: v,
          label: V,
          swipe_up: text_fullchineseguillemet,
          swipe_down: tiger_V,
          long_click: [commit_v, text_fullchineseguillemet, commit_V],
        }
      - {
          click: z,
          label: Z,
          swipe_up: "=",
          swipe_down: tiger_Z,
          long_click: [commit_z, "=", commit_Z],
        }
      - {
          click: backspace,
          name: backspace,
          preview: false,
          swipe_up: function_keyboard_clearAll,
          swipe_down: function_keyboard_undo,
          width: 10,
        }

      # 第四行
      - {
          click: eisu_toggle_符_symbols,
          width: 13,
          name: symbol,
          preview: false,
        }
      - {
          click: eisu_toggle_123_number,
          has_menu: text_halfperiod,
          width: 12,
          name: number,
          preview: false,
        }
      - {
          click: space,
          width: 43,
          name: space,
          swipe_up: select_second,
          swipe_down: Tab,
          preview: false,
        }
      - {
          click: eisu_toggle_keyboard_english_schema_easy_english,
          has_menu: text_halfcomma,
          width: 10,
          name: english,
          preview: false,
        }
      - {
          click: return,
          width: 22,
          name: return,
          swipe_up: select_third,
          composing: confirm,
          long_click:
            [
              function_keyboard_clearAll,
              function_keyboard_clearLeft,
              function_keyboard_clearRight,
              function_keyboard_undo,
              function_keyboard_redo,
              next,
            ],
          rect_preview: true,
          preview: false,
        }
  default_sm_md:
    height: 32
    height_land: 34
    horizontal_gap: 2
    vertical_gap: 2
    vertical_gap_land: 4
    key_text_offset_x: 0
    key_text_offset_y: 3
