  english:
    ascii_mode: 1
    lock: true
    name: english
    width: 9
    menu: { events: [
            eisu_toggle_emoji,
            function_common_speech_recognition,
            eisu_toggle_keyboard_default,
            eisu_toggle_clip_board,
            eisu_toggle_edit_setting,
            function_rime_switcher,
          ] }
    keys:
      # 第一行
      - { click: "'", swipe_up: commit_1, long_click: ["'", 1, '"'] }
      - { click: ',', swipe_up: commit_2, long_click: [',', 2, '<'] }
      - { click: '.', swipe_up: commit_3, long_click: ['.', 3, '>'] }
