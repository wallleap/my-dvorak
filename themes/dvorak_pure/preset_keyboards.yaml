      - { click: s, swipe_up: "'", long_click: [s, "'", S] }
      - { click: "-", swipe_up: "+", long_click: ["-", "+"] }

      # 第三行
      - { click: shift,  name: shift }
      - { click: q, swipe_up: "_", long_click: [q, "_", Q] }
      - { click: j, swipe_up: "#", long_click: [j, "#", J] }
      - { click: k, swipe_up: "?", long_click: [k, "?", K] }
      - { click: x, swipe_up: "!", long_click: [x, "!", X] }
      - { click: b, swipe_up: ",", long_click: [b, ",", B] }
      - { click: m, swipe_up: ".", long_click: [m, ".", M] }
      - { click: w, swipe_up: "+", long_click: [w, "+", W] }
      - { click: v, swipe_up: "=", long_click: [v, "=", V] }
      - { click: z, swipe_up: "\\", long_click: [z, "\\", Z] }
      - {
          click: backspace,
          width: 10,
          name: backspace,
          swipe_up: function_keyboard_clearAll,
          swipe_down: function_keyboard_undo,
        }

      # 第四行
      - { click: eisu_toggle_符_symbols, width: 13, name: symbol }
      - { click: eisu_toggle_123_number, width: 10, name: number }
      - { click: send_dot, width: 10 }
      - { click: space, width: 31, name: space, swipe_down: Tab }
      - {
          click: eisu_toggle_en_zh_default_schema_default,
          width: 11,
          name: english,
          preview: false,
        }
      - {
          click: return,
          width: 25,
          name: return,
          composing: confirm,
