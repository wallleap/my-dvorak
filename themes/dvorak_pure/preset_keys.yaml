# custom settings
# encoding: utf-8

# 自定义按键
custom:
  __include: ./../public/preset_keys/default:/preset_keys
  function_keyboard_my_selectAll: { icon: "smart_selection_area.svg", label: "全选", send: function, command: keyboard.selectAll, option: "" }
  function_keyboard_my_cut: { icon: "cut.svg", label: "剪切", send: function, command: keyboard.cut, option: "" }
  function_keyboard_my_copy: { icon: "doc_plaintext_2.svg", label: "复制", send: function, command: keyboard.copy, option: "" }
  function_keyboard_my_paste: { icon: "text_clipboard.svg", label: "粘贴", send: function, command: keyboard.paste, option: "" }
  eisu_toggle_edit_setting:
    {
      icon: "rename.svg",
      label: "快捷编辑",
      send: Eisu_toggle,
      select: _setting_board,
      option:
        [
          function_keyboard_my_selectAll,
          function_keyboard_my_cut,
          function_keyboard_my_copy,
          function_keyboard_my_paste,
          function_keyboard_newline,
          function_keyboard_clearAll,
          function_keyboard_clearLeft,
          function_keyboard_clearRight,
          function_keyboard_undo,
          function_keyboard_redo,
          function_keyboard_deleteLeft,
          function_keyboard_deleteRight,
        ],
    }
  eisu_toggle_schema_english:
    {
      icon: "textformat.svg",
      label: "中文",
      send: Eisu_toggle,
      select: easy_english,
      option: schema,
    }
  eisu_toggle_schema_default:
    {
      icon: "textformat.svg",
      label: "英文",
      send: Eisu_toggle,
      select: .default,
      option: schema,
    }
  eisu_toggle_keyboard_english:
    {
      icon: "keyboard_zh.svg",
      label: "中/英",
      send: Eisu_toggle,
      select: english,
    }
  eisu_toggle_keyboard_english_sm_md:
    {
      icon: "keyboard_zh.svg",
      label: "中/英",
      send: Eisu_toggle,
      select: english_sm_md,
    }
  eisu_toggle_keyboard_english_schema_easy_english:
    {
      icon: "keyboard_badge_globe.svg",
      label: "中/英",
      text: "{eisu_toggle_keyboard_english}{eisu_toggle_schema_english}",
    }
  eisu_toggle_keyboard_english_sm_md_schema_easy_english:
    {
      icon: "keyboard_badge_globe.svg",
      label: "中/英",
      text: "{eisu_toggle_keyboard_english_sm_md}{eisu_toggle_schema_english}",
    }
  eisu_toggle_keyboard_default:
    {
      icon: "keyboard_en.svg",
      label: "英/中",
      send: Eisu_toggle,
      select: default,
    }
  eisu_toggle_keyboard_default_sm_md:
    {
      icon: "keyboard_en.svg",
      label: "英/中",
      send: Eisu_toggle,
      select: default_sm_md,
    }
  commit_grave: { label: "`", commit: grave }
  commit_doublequote: { label: "\"", commit: "\"" }
  commit_apostrophe: { label: "'", commit: "'" }
  commit_slash: { label: "/", commit: "/" }
  commit_comma: { label: ",", commit: "," }
  commit_period: { label: ".", commit: "." }
  commit_semicolon: { label: ";", commit: ";" }
  text_halfbracket: { label: "()", text: "(){Left}" } # 先上屏()光标往左移动一格
  text_fullbracket: { label: "（）", text: "（）{Left}" }
  text_halfsquarebracket: { label: "[]", text: "[]{Left}" }
  text_fullsquarebracket: { label: "【】", text: "【】{Left}" }
  text_halfchineseguillemet: { label: "<>", text: "<>{Left}" }
  text_fullchineseguillemet: { label: "《》", text: "《》{Left}" }
  send_grave: { label: "`", send: grave }
  send_equal: { label: "=", send: equal }
  text_grave_default_no_functional: { label: "`", text: "{send_grave}{eisu_toggle_keyboard_default}", functional: false } #先上屏`再跳转到default键盘

  # 不要修改以下按键 label（字体原因没显示全，修改后显示异常）
  tiger_P: { label: "戈	猎	旧米\n鼠足⻊行走	", text: "{function_rime_clear}", functional: false }
