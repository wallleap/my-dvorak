tool_bar:
  button_spacing: 2 # 按钮间距
  button_font: [iconfont.ttf] # 按钮字体

  # 左侧固定主按钮配置
  primary_button:
    # 背景样式设置
    background:
      type: circle # 高亮形状 (可选值: circle|rectangle)
      corner_radius: 10 # 圆角半径
      bg_normal: "0x00" # 正常状态背景颜色
      bg_highlight: hilited_candidate_button_color # 高亮状态背景色
      vertical_inset: 4 # 垂直方向内缩量
      horizontal_inset: 0 # 水平方向内缩量
    # 前景内容设置
    foreground:
      style: "ic@widgets_outline" # 新版wiki，图标样式（以ic@开头）
      fg_normal: candidate_text_color # 正常状态前景色 (本地图片不允许着色)
      # fg_highlight: # 高亮状态前景色
      padding: 10 # 前景内容与背景边界的内边距
      # size: [120, 24] # 视图控件宽高，非前景样式宽高
    # 按钮点击事件
    action: menu_keyboard

  hide_button: &hide_button
    foreground:
      style: "ic@keyboard_close"
      fg_normal: candidate_text_color
    action: Hide

  emoji_button: &emoji_button
    foreground:
      style: "ic@emoticon_wink_outline"
    # 前景样式可以为空，使用默认样式，按钮将显示为 action 的 label
    action: liquid_keyboard_emoji

  clipboard_button: &clipboard_button
    foreground:
      style: "ic@content_paste"
    action: clipboard_window

  edit_button: &edit_button
    foreground:
      style: "ic@circle_edit_outline"
    action: Keyboard_editor

  ascii_mode_button: &ascii_mode_button
    foreground:
      option_styles: ["中", "En"] # 样式也可以为表，将根据 action 的 toggle 决定
      font_size: 18 # 按钮字体大小
      padding: 10
    action: Mode_switch

  full_shape_button: &full_shape_button
    foreground:
      option_styles: ["ic@circle_outline", "ic@record_circle_outline"]
    action: Zenkaku_Hankaku

  # 右侧按钮列表（从右向左排列）
  buttons: [
    *hide_button,
    *emoji_button,
    *clipboard_button,
    *edit_button,
    # *ascii_mode_button,
    *full_shape_button,
  ]

# 键盘布局
preset_keyboards:
  default:
    author: "vonnelu"
    name: "中文 Dvorak 布局"
    width: 9
    # height: 48
    ascii_mode: 0
    key_text_offset_y: 4
    key_hint_offset_y: -2
    key_symbol_offset_y: 4
    keys:
      # 第一行
      - {
          label: "'",
          key_text_size: 28,
          key_text_offset_y: 8,
          label_symbol: 1,
          # hint: 一,
          click: apostrophe,
          popup: ["''{Left}", "\"\"{Left}", Commit_Yi, Commit_Num_1], # 顺序和实际显示好像不一样
          swipe_up: Commit_Num_1,
          # swipe_down: Commit_Yi,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: ",",
          key_text_size: 28,
          key_text_offset_y: -4,
          label_symbol: 2,
          click: comma,
          popup: [",", Commit_Er, Commit_Num_2],
          swipe_up: Commit_Num_2,
          # swipe_down: Commit_Er,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: ".",
          key_text_size: 28,
          key_text_offset_y: -4,
          label_symbol: 3,
          click: period,
          popup: [".", Commit_San, Commit_Num_3],
          swipe_up: Commit_Num_3,
          # swipe_down: Commit_San,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "P",
          label_symbol: 4,
          click: p,
          popup: [commit_p, Commit_Upper_P, Commit_Si, Commit_Num_4],
          swipe_up: Commit_Num_4,
          swipe_down: tiger_P,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "Y",
          label_symbol: 5,
          click: y,
          popup: [commit_y, Commit_Upper_Y, Commit_Wu, Commit_Num_5],
          swipe_up: Commit_Num_5,
          swipe_down: tiger_Y,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "F",
          label_symbol: 6,
          click: f,
          popup: [commit_f, Commit_Upper_F, Commit_Liu, Commit_Num_6],
          swipe_up: Commit_Num_6,
          swipe_down: tiger_F,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "G",
          label_symbol: 7,
          click: g,
          popup: [commit_g, Commit_Upper_G, Commit_Qi, Commit_Num_7],
          swipe_up: Commit_Num_7,
          swipe_down: tiger_G,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "C",
          label_symbol: 8,
          click: c,
          popup: [commit_c, Commit_Upper_C, Commit_Ba, Commit_Num_8],
          swipe_up: Commit_Num_8,
          swipe_down: tiger_C,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "R",
          label_symbol: 9,
          click: r,
          popup: [commit_r, Commit_Upper_R, Commit_Jiu, Commit_Num_9],
          swipe_up: Commit_Num_9,
          swipe_down: tiger_R,
          key_back_color: bh1,
          key_text_color: th1,
        }
      - {
          label: "L",
          label_symbol: 0,
          click: l,
          popup: [commit_l, Commit_Upper_L, Commit_Num_0],
          swipe_up: Commit_Num_0,
          swipe_down: tiger_L,
          key_back_color: bh1,
          key_text_color: th1,
