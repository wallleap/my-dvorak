# Trime theme settings: pure.trime.yaml 同文输入法主题
# encoding: utf-8
# https://github.com/osfans/trime/blob/develop/app/src/main/assets/shared/trime.yaml
# https://github.com/osfans/trime/wiki
# 修改自 tongwenfeng.trime.yaml

name: Dvorak # 方案名称
author: "vonnelu<vonnelu@163.com>" # 作者信息

# 键盘高度
height:
  1: &jpgd1 30 # 表情键盘
  2: &jpgd2 24 # 颜文字键盘1
  3: &jpgd3 24 # 颜文字键盘2
  4: &jpgd4 58 # 主键盘
  5: &jpgd5 39.5 # 符号键盘
  6: &hgap 12 # 键盘横缝大小
  7: &sgap 6 # 键盘竖缝大小

# 键盘圆角
round_corner:
  1: &round1 6 # 按键圆角半径
  2: &round2 4 # 候选窗口圆角
  3: &round3 6 # 回车键圆角

# 界面风格、功能开关
style:
  auto_caps: false # 自動句首大寫：true|false
  candidate_use_cursor: true
  candidate_font: han.ttf # 候选字体
  candidate_padding: 5 # 候选项内边距
  candidate_spacing: 0.5 # 候选间距
  candidate_text_size: 18 # 候选字号
  candidate_view_height: 28 # 候选区高度
  comment_font: comment.ttf # 编码提示字体
  comment_height: 18 # 编码提示区高度
  comment_on_top: false # 编码提示在上方或右侧
  comment_text_size: 10 # 编码提示字号
  hanb_font: hanb.ttf # 扩充字体
  horizontal_gap: *hgap # 键水平间距
  key_font: symbol.ttf # 键盘字体
  key_height: *jpgd4 # 键高
  key_long_text_size: 18 # 长标签字号
  key_text_size: 20 # 键字号
  key_width: 10.0 # 键宽，占屏幕宽的百分比
  keyboard_padding: 6
  keyboard_padding_bottom: 6
  label_text_size: 8 # 标签字号
  label_font: label.ttf # 编标签字体
  latin_font: latin.ttf # 西文本体
  keyboard_height: 268 # 锁定键盘高度，避免切换时键盘高度变化而造成闪烁
  keyboard_height_land: 200 # 锁定横屏下键盘高度，避免切换时键盘高度变化而造成闪烁
  popup_font: latin.ttf # 按键提示字体
  popup_width: 38 # 按键提示宽度
  popup_height: 48 # 按键提示高度
  popup_bottom_margin: 68 # 按键提示底边距
  popup_key_height: 48 # 按键提示内键高度
  popup_text_size: 23 # 按键提示字号
  proximity_correction: true # 按键纠错
  reset_ascii_mode: false # 显示键盘时重置为中文状态
  round_corner: *round1 # 按键圆角半径
  shadow_radius: 0.0 # 按键阴影半径
  symbol_font: symbol.ttf # 符号字体
  symbol_text_size: 10 # 符号字号
  text_font: latin.ttf # 编码字体
  vertical_correction: -10
  vertical_gap: *sgap # 键盘行距
  enter_label_mode: 2 # 是否使用App提供的ActionLabel内容作为Enter键的文本（由于多数App没有适配ActionLable，实际影响不大）。0不使用，1只使用actionlabel，2优先使用，3当其他方式没有获得label时才读取actionlabel
  enter_labels: # 定义Enter键的文本
    go: 前往
    done: 完成
    next: 下个
    pre: 上个
    search: 搜索
    send: 发送
    default: 换行 # 定义默认Enter键的文本

preedit: # 预编辑文本视图参数
  horizontal_padding: 8 # 横向内边距（整数）
  # alpha: 0.8 # 透明度（0-1，浮点）
  top_end_radius: 4 # 末上端圆角（浮点）
  foreground: # 前景样式
    font_size: 16 # 预编辑字体大小（浮点）

window: # 候选窗口（悬浮窗）参数
  insets: # 窗口内边距
    vertical: 4 # 纵向内边距（整数）
    horizontal: 4 # 横向内边距（整数）
  item_padding: # 候选项内边距
    # vertical: 0 # 纵向内边距（整数）
    horizontal: 4 # 横向内边距（整数）
  # min_width: 0 # 最小宽度（整数）
  # corner_radius: 0 # 圆角半径（浮点）
  # alpha: 1 # 透明度（0-1，浮点）
  foreground: # 前景样式
    label_font_size: 16 # 序号字体大小（浮点）
    text_font_size: 16 # 文字字体大小（浮点）
    comment_font_size: 12 # 注释字体大小（浮点）

# 最好保留一项，防止其他主题使用 __include 时无法加载
fallback_colors:
  candidate_text_color: text_color
# 以下值是程序内置的，你也可以在这里自定义，这会覆盖默认值
#
# comment_text_color: candidate_text_color
# border_color: back_color
# candidate_separator_color: border_color
# hilited_text_color: text_color
# hilited_back_color: back_color
# hilited_candidate_text_color: hilited_text_color
# hilited_candidate_back_color: hilited_back_color
# hilited_candidate_button_color: hilited_candidate_back_color # 候选栏工具按钮高亮背景色
# hilited_label_color: hilited_candidate_text_color # 高亮候选序号 颜色
# hilited_comment_text_color: comment_text_color
# hilited_key_back_color: hilited_candidate_back_color
# hilited_key_text_color: hilited_candidate_text_color
# hilited_key_symbol_color: hilited_comment_text_color
# hilited_off_key_back_color: hilited_key_back_color
# hilited_on_key_back_color: hilited_key_back_color
# hilited_off_key_text_color: hilited_key_text_color
# hilited_on_key_text_color: hilited_key_text_color
# key_back_color: back_color
# key_border_color: border_color
# key_text_color: candidate_text_color
# key_symbol_color: comment_text_color
# label_color: candidate_text_color
# off_key_back_color: key_back_color
# off_key_text_color: key_text_color
# on_key_back_color: hilited_key_back_color
# on_key_text_color: hilited_key_text_color
# preview_back_color: key_back_color
# preview_text_color: key_text_color
# shadow_color: border_color
# root_background: back_color # 整个键盘区+候选栏的背景图/色
# candidate_background: back_color # 候选栏的整体背景图/色
# keyboard_back_color: border_color # 键盘区的背景图/色
# liquid_keyboard_background: keyboard_back_color # liquidKeyboard的背景图/色
# text_back_color: back_color # 编码区背景，即悬浮窗背景
# long_text_back_color: key_back_color # 长文本按键的背景(剪贴板）

# 颜色 0xaarrggbb "#aarrggbb"
colors:
  1: &color1 0xFF222222 # 深黑
  2: &color2 0xFFE1E2E6 # 浅灰
  3: &color3 0xFF999999 # 深灰
  4: &color4 0xFFC7C9D0 # 灰
  5: &color5 0xff131313
  6: &color6 0xFF4F84FE # 蓝色
  7: &color7 0x00
  8: &color8 0xFF9E9E9E # 深灰
  9: &color9 0xFFFFFFFF # 纯白

# 配色方案
preset_color_schemes:
  default:
    name: "默认／Default" # 方案名称
    author: vonnelu # 作者信息
    dark_scheme: default_dark # 对应暗色颜色
    # ▼悬浮窗口
    border_color: *color2 # 悬浮窗边框
    label_color: *color3 # 悬浮窗候选序号
    hilited_text_color: *color1 # 高亮编码
    text_color: *color6 # 编码
    hilited_back_color: *color2 # 高亮编码背景
    text_back_color: *color2 # 编码区背景 ☆支持图片
    # ▼输入面板
    root_background: *color2 # 键盘和候选区整体背景 ☆
    # ▼候选项
    back_color: *color2 # 候选区背景
    candidate_backgroud: *color2 # 候选区整体背景 ☆
    hilited_candidate_back_color: *color2 # 高亮候选背景
    candidate_separator_color: *color2 # 候选分割线
    candidate_text_color: *color1 # 候选文本
    hilited_candidate_text_color: *color6 # 高亮候选文本
    comment_text_color: *color3 # 候选项注释
    hilited_comment_text_color: *color3 # 高亮候选项注释
    # ▼键盘
    key_back_color: *color9 # 按键背景 ☆
    hilited_key_back_color: *color6 # 高亮按键背景 ☆
    key_text_color: *color1 # 按键文本
    hilited_key_text_color: *color9 # 高亮按键文本
    key_symbol_color: *color8 # 按键符号
    hilited_key_symbol_color: *color2 # 高亮按键符号
    popup_back_color: *color4 # 按键提示背景
    popup_text_color: *color6 # 按键提示文本
    hilited_popup_text_color: *color9 # 高亮按键提示文本
    shadow_color: *color1 # 按键文字阴影
    # keyboard_back_color: *color2  # 键盘背景（使用下面这个） ☆
    keyboard_backgroud: *color2 # 键盘背景，铺满候选栏和导航栏 ☆
    liquid_keyboard_backgroud: *color2 # liquidKeyBoard 键盘背景 ☆
    long_text_back_color: *color2 # 长文本的按键背景（比如剪贴板） ☆
    key_border_color: *color8 # 按键边框
    # ▼功能键
    off_key_back_color: *color4 # 功能键背景 ☆
    hilited_off_key_back_color: *color2 # 功能键高亮背景（按下时） ☆
    off_key_text_color: *color8 # 功能键文本
    hilited_off_key_text_color: *color9 # 功能键高亮文本
    on_key_back_color: *color6 # Shift 键锁定时背景 ☆
    hilited_on_key_back_color: *color2 # Shift 键锁定时背景（按下时） ☆
    on_key_text_color: *color9 # Shift 键锁定时文本
    hilited_on_key_text_color: *color2 # Shift 键锁定时高亮文本
    # ▼后面使用
    bkg: *color9 # 空格键背景色
    tkg: *color1 # 空格键文字颜色
    benter: *color6 # 回车键背景色
    tenter: *color9 # 回车键文字颜色
    bgn: *color4 # 功能键背景色
    tgn: *color1 # 功能键文字颜色
    bbs: *color4 # 退格键背景色
    tbs: *color1 # 退格键文字颜色
    baoe: *color9 # aoeiu背景色
    taoe: *color6 # aoeiu文字颜色
    bh1: *color9 # 第一行背景色
    th1: *color1 # 第一行文字颜色
    bh2: *color9 # 第二行背景色
    th2: *color1 # 第二行文字颜色
    bh3: *color9 # 第三行背景色
    th3: *color1 # 第三行文字颜色
    bh4: *color9 # 第四行背景色
    th4: *color1 # 第四行文字颜色

  #--------配色开始----------------#
  default_dark:
    name: 暗黑／Dark # 方案名稱
    author: vonnelu # 作者資訊
    light_scheme: default # 对应亮色颜色
    # ▼悬浮窗口
    border_color: 0xFF222222 # 悬浮窗边框
    label_color: 0x9E9E9E # 悬浮窗候选序号
    hilited_text_color: 0x99FFFFFF # 高亮编码
    text_color: 0xFFFFFF # 编码
    hilited_back_color: 0xFF222222 # 高亮编码背景
    text_back_color: 0xFF222222 # 编码区背景 ☆支持图片
    # ▼输入面板
    root_background: 0xFF222222 # 键盘和候选区整体背景 ☆
    # ▼候选项
    back_color: 0xFF222222 # 候选区背景
    candidate_backgroud: 0xFF222222 # 候选区整体背景 ☆
    hilited_candidate_back_color: 0xFF4870D0 # 高亮候选背景
    candidate_separator_color: 0xFF222222 # 候选分割线
    candidate_text_color: 0xFFFFFF # 候选文本
    hilited_candidate_text_color: 0xFFFFFF # 高亮候选文本
    comment_text_color: 0x9E9E9E # 候选项注释
    hilited_comment_text_color: 0xCCFFFFFF # 高亮候选项注释
    # ▼键盘
    key_back_color: 0x595D60 # 按键背景 ☆
    hilited_key_back_color: 0x4870D0 # 高亮按键背景 ☆
    key_text_color: 0xF5F5F5 # 按键文本
    hilited_key_text_color: 0xF5F5F5 # 高亮按键文本
    key_symbol_color: 0x999999 # 按键符号
    hilited_key_symbol_color: 0xCCFFFFFF # 高亮按键符号
    popup_back_color: 0x595D60 # 按键提示背景
    popup_text_color: 0xCCFFFFFF # 按键提示文本
    hilited_popup_text_color: 0xF5F5F5 # 高亮按键提示文本
    # shadow_color: *color1  # 按键文字阴影
    # keyboard_back_color: *color2  # 键盘背景（使用下面这个） ☆
    keyboard_backgroud: 0xFF222222 # 键盘背景，铺满候选栏和导航栏 ☆
    liquid_keyboard_backgroud: 0xFF222222 # liquidKeyBoard 键盘背景 ☆
    long_text_back_color: 0xFF222222 # 长文本的按键背景（比如剪贴板） ☆
    key_border_color: 0x595D60 # 按键边框
    # ▼功能键
    off_key_back_color: 0x333333 # 功能键背景 ☆
    hilited_off_key_back_color: 0xFF222222 # 功能键高亮背景（按下时） ☆
    off_key_text_color: 0xF5F5F5 # 功能键文本
    hilited_off_key_text_color: *color9 # 功能键高亮文本
    on_key_back_color: 0x4870D0 # Shift 键锁定时背景 ☆
    hilited_on_key_back_color: 0xFF222222 # Shift 键锁定时背景（按下时） ☆
    on_key_text_color: *color9 # Shift 键锁定时文本
    hilited_on_key_text_color: 0xFFFFFFFF # Shift 键锁定时高亮文本
    # ▼后面使用
    bkg: 0x595D60 # 空格键背景色
    tkg: 0xF5F5F5 # 空格键文字颜色
    benter: 0x4870D0 # 回车键背景色
    tenter: 0xF5F5F5 # 回车键文字颜色
    bgn: 0x333333 # 功能键背景色
    tgn: 0xF5F5F5 # 功能键文字颜色
    bbs: 0x333333 # 退格键背景色
    tbs: 0xF5F5F5 # 退格键文字颜色
    baoe: 0x333333 # aoeiu背景色
    taoe: 0x595D60 # aoeiu文字颜色
    bh1: 0x595D60 # 第一行背景色
    th1: 0xF5F5F5 # 第一行文字颜色
    bh2: 0x595D60 # 第二行背景色
    th2: 0xF5F5F5 # 第二行文字颜色
    bh3: 0x595D60 # 第三行背景色
    th3: 0xF5F5F5 # 第三行文字颜色
    bh4: 0x595D60 # 第四行背景色
    th4: 0xF5F5F5 # 第四行文字颜色
#--------配色结束----------------#

liquid_keyboard:
  # 目前只能直接写参数，不支持变量或者fallback机制。
  # 缺少参数时，自动从style中加载参数。除非需要指定liquid_keyboard使用与主键盘不同的背景色、背景图，否则不应设置被注释掉的参数。
  author: "tumuyan"
  row: 6 # 每屏最多显示多少行按键
  row_land: 5 # 横屏每屏最多显示多少行按键
  key_height: 40 # 按键高度
  key_height_land: 40 # 横屏模式按键高度
  single_width: 60 # single类型的按键宽度
  vertical_gap: 8 # 纵向按键间隙
  margin_x: 5 # 左右按键间隙的1/2
  fixed_key_bar: # 固定按键条
    position: bottom # 摆放位置（在滚动区域的……） top|bottom|left|right
    keys: # 按键（显示名称为对应的label，不能放太多）
      - liquid_keyboard_exit
      - space1
      # - BackSpace
      - Return2
      - clipboard_window
      - liquid_keyboard_tabs
  keyboards: [
      emoji,
      math,
      ascii,
      cn,
      history,
      symbollist,
      list,
      ids,
      symbol,
      tabs,
      pinyin,
      script_symbols,
      jp,
      grease,
      rusa,
      korea,
      lation,
      yinbiao,
      unit,
      yanwenzi,
      combing,
      emoji_full,
    ] # tab列表
  tabs:
    name: 更多
    type: TABS
  history:
    name: 常用
    type: HISTORY
  emoji:
    type: SINGLE
    keys: "🙂😂🤣😆🙃😅🥺😎👀🙈🙉🙊☹😑😄🤐😨😱🌚🌝🤔❤💔🌹💣👌👍😣😥😮🙄😏😕😯😪😫😴😌🤑😉😋😎😍😘😚😛😜😝😒😓😔😲😷🤒😇🤓🤗🤕🙁😖😞😟😤😢😭😦😧😨😩😬😰😳😵😡😠☝✌🖕👎🙏🤘👏💪💋☘🍀🌸☕🍵🍺🍻🍦🍬🍚🍜🍲🍖🎂💤"
  emoji_full:
